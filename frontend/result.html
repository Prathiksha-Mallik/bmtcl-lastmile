<!DOCTYPE html>
<html>
<head>
    <title>Metro Last Mile System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: url("result.png") no-repeat center center;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: rgba(255,255,255,0.95);
            width: 450px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #autoBox {
            display: none;
            margin-top: 10px;
        }

        #autoBox img {
            width: 60px;
        }

        #result {
            margin-top: 15px;
            text-align: left;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>🚇 Bangalore Metro Last Mile</h2>

    <!-- LINE -->
    <select id="line">
        <option value="">Select Line</option>
        <option>Purple</option>
        <option>Green</option>
    </select>

    <!-- STATION -->
    <select id="station">
        <option value="">Select Station</option>
        <option>Indiranagar</option>
        <option>MG Road</option>
        <option>Majestic</option>
        <option>Cubbon Park</option>
        <option>Vidhana Soudha</option>
    </select>

    <!-- DESTINATION -->
    <input type="text" id="destination" placeholder="Enter Destination">

    <!-- BUTTON -->
    <button onclick="getPlaces()">Find Nearby Places</button>

    <!-- AUTO -->
    <div id="autoBox">
        <img src="https://cdn-icons-png.flaticon.com/512/1995/1995470.png">
        <p>🚕 Auto Available near metro</p>
    </div>

    <!-- RESULT -->
    <div id="result"></div>

</div>

<script>

async function getPlaces() {

    let line = document.getElementById("line").value;
    let station = document.getElementById("station").value;
    let destination = document.getElementById("destination").value;

    if (!station || !destination) {
        alert("Please fill all fields");
        return;
    }

    document.getElementById("autoBox").style.display = "block";

    try {
        const res = await fetch(
            `http://127.0.0.1:5000/get_places?station=${encodeURIComponent(station)}&destination=${encodeURIComponent(destination)}`
        );

        const data = await res.json();

        // 🔴 HANDLE ERROR FROM BACKEND
        if (data.error) {
            document.getElementById("result").innerHTML = `<p style="color:red;">${data.error}</p>`;
            return;
        }

        let html = `
            <h3>🚇 Line: ${line}</h3>
            <h3>📍 Station: ${data.station}</h3>
            <h3>🎯 Destination: ${data.destination}</h3>

            <p>🚪 <b>Recommended Exit:</b> ${data.exit || "Not available"}</p>

            <hr>

            <h4>🚕 Transport Info:</h4>
            <p>📏 Distance: ${data.distance || "N/A"}</p>
            <p>🚶 Walking Time: ${data.walking_time || "N/A"}</p>
            <p>🚗 Vehicle Time: ${data.vehicle_time || "N/A"}</p>
            <p>⏱ Waiting Time: ${data.waiting_time || "N/A"}</p>

            <h3>💡 Suggestion: ${data.suggestion || "N/A"}</h3>

            <hr>

            <h4>🛍️ Nearby Places:</h4>
            <ul>
        `;

        if (data.nearby_places && data.nearby_places.length > 0) {
            data.nearby_places.forEach(p => {
                html += `<li>🏬 ${p}</li>`;
            });
        } else {
            html += `<li>No data available</li>`;
        }

        html += "</ul>";

        document.getElementById("result").innerHTML = html;

    } catch (err) {
        console.log(err);
        alert("Backend error (check terminal)");
        
    }
}

</script>

</body>
</html>
