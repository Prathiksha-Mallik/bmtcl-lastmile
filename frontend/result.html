<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <link rel="stylesheet" href="style.css">
    <style>
        html, body{
            margin:0;
            width:100%;
            height:100%;
            overflow:hidden;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            background:url("result.png") no-repeat center center;
            background-size:100% 100%;
        }
    </style>
</head>
<body>

<div class="box"><br>
    <h1>Travel Details</h1>

    <p><b>Line:</b> <span id="line"></span></p>
    <p><b>Station:</b> <span id="station"></span></p>
    <p><b>Destination:</b> <span id="destination"></span></p>

    <p>🚶 Walking Time: 8 mins</p>
    <p>⏳ Waiting Time: 12 mins</p>
    <p>🚌 Auto Available: Yes</p>

    <h2>✅ Suggestion: Walk</h2>
</div>

<script>
document.getElementById("line").innerText =
localStorage.getItem("metroLine");

document.getElementById("station").innerText =
localStorage.getItem("station");

document.getElementById("destination").innerText =
localStorage.getItem("destination");
</script>

</body>
</html>
