<!DOCTYPE html>
<html>
<head>
    <title>Metro Last Mile System</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: url("result.png") no-repeat center center;
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            background: rgba(255,255,255,0.95);
            width: 450px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #autoBox {
            display: none;
            margin-top: 10px;
        }

        #autoBox img {
            width: 60px;
        }

        #result {
            margin-top: 15px;
            text-align: left;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>🚇 Bangalore Metro Last Mile</h2>

    <!-- ENTER LINE -->
    <select id="line">
        <option value="">Select Line</option>
        <option>Purple</option>
        <option>Green</option>
    </select>

    <!-- ENTER STATION -->
    <select id="station">
        <option value="">Select Station</option>

        <option>Whitefield (Kadugodi)</option>
        <option>Indiranagar</option>
        <option>MG Road</option>
        <option>Majestic</option>
        <option>Vijayanagar</option>
        <option>Kengeri</option>
        <option>KR Market</option>
        <option>Yeshwanthpur</option>
        <option>Banashankari</option>
        <option>Jayanagar</option><option>Whitefield (Kadugodi)</option>
        <option>Hopefarm Channasandra</option>
        <option>KR Puram</option>
        <option>Indiranagar</option>
        <option>MG Road</option>
        <option>Trinity</option>
        <option>Cubbon Park</option>
        <option>Vidhana Soudha</option>
        <option>Majestic</option>
        <option>KSR City Railway Station</option>
        <option>Magadi Road</option>
        <option>Vijayanagar</option>
        <option>Attiguppe</option>
        <option>Mysuru Road</option>
        <option>Kengeri</option>
        <option>Nayandahalli</option>
        <option>Rajajinagar</option>
        <option>Peenya</option>
        <option>Dasarahalli</option>
        <option>Nagasandra</option>
        <option>Yeshwanthpur</option>
        <option>Sandal Soap Factory</option>
        <option>Mahalakshmi</option>
        <option>Srirampura</option>
        <option>Mantri Square</option>
        <option>Chickpet</option>
        <option>KR Market</option>
        <option>National College</option>
        <option>Lalbagh</option>
        <option>South End Circle</option>
        <option>Jayanagar</option>
        <option>Banashankari</option>
        <option>Yelachenahalli</option>
        <option>Silk Institute</option> 

    </select>

    <!-- ENTER DESTINATION -->
    <input type="text" id="destination" placeholder="Enter Destination (Shop / Mall / Area)">

    <button onclick="getPlaces()">Find Nearby Places</button>

    <!-- AUTO ICON -->
    <div id="autoBox">
        <img src="https://cdn-icons-png.flaticon.com/512/1995/1995470.png">
        <p>🚕 Auto Available near metro</p>
    </div>

    <!-- RESULT -->
    <div id="result"></div>

</div>

<script>

function getPlaces() {

    let line = document.getElementById("line").value;
    let station = document.getElementById("station").value.toLowerCase();
    let destination = document.getElementById("destination").value;

    document.getElementById("autoBox").style.display = "block";

    fetch(`http://127.0.0.1:5000/get_places?station=${station}`)
    .then(res => res.json())
    .then(data => {

        let html = `
            <h3>🚇 Line: ${line}</h3>
            <h3>📍 Station: ${data.station}</h3>
            <h3>🎯 Destination: ${destination}</h3>
             <hr>

    <h4>🚕 Transport Info:</h4>
    <p>⏱ Waiting Time: ${data.bus_waiting_time} </p>
    <p>🚌 BMTCL Bus Available: ${data.auto==  "Yes" ?"Yes": "No"}</p>
    <p>🚶 Walking Time: ${data.walking_time} </p>

    <h3>💡 Suggestion: ${data.suggestion}</h3>

    <hr>

            <hr>

            <h4>🛍️ Nearby Places:</h4>
            <ul>
        `;

        data.nearby_places.forEach(p => {
            html += `<li>🏬 ${p}</li>`;
        });

        html += "</ul>";

        document.getElementById("result").innerHTML = html;
    });

}

</script>

</body>
</html>
