<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>
    <link rel="stylesheet" href="style.css">
    <style>
        html, body{
            margin:0;
            width:100%;
            height:100%;
            overflow:hidden;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            background:url("welcome.png") no-repeat center center;
            background-size:100% 100%;
        }
    </style>
</head>
<body>

<div class="box"><br>
    <h1>BMTCL Last-Mile Connector</h1>
    <h1>Welcome!</h1>
    <br>
    <h3>Select Metro Line</h3>

    <button onclick="selectLine('Green Line')">Green Line</button>
    <button onclick="selectLine('Purple Line')">Purple Line</button>
</div>

<script>
function selectLine(line){
    localStorage.setItem("metroLine", line);
    window.location.href = "connector.html";
}
</script>

</body>
</html>
