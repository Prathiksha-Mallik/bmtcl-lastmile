<!DOCTYPE html>
<html>
<head>
    <title>Connector</title>
    <link rel="stylesheet" href="style.css">
    <style>
        html, body{
            margin:0;
            width:100%;
            height:100%;
            overflow:hidden;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            background:url("connector.png") no-repeat center center;
            background-size:100% 100%;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>Select the metro station and your destination</h1><br>

    <h3 id="line"></h3>

    <input type="text" id="station" placeholder="Enter Metro Station">

    <input type="text" id="destination" placeholder="Enter Destination">

    <button onclick="nextPage()">Get Details</button>
</div>

<script>
document.getElementById("line").innerText =
"Selected Line: " + localStorage.getItem("metroLine");

function nextPage(){
    localStorage.setItem("station",
        document.getElementById("station").value);

    localStorage.setItem("destination",
        document.getElementById("destination").value);

    window.location.href = "result.html";
}
</script>

</body>
</html>
