<!DOCTYPE html>
<html>
<head>
    <title>Connector</title>
    <link rel="stylesheet" href="style.css">

    <style>
        html, body{
            margin:0;
            width:100%;
            height:100%;
            overflow:hidden;
        }

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            background:url("connector.png") no-repeat center center;
            background-size:100% 100%;
            font-family: Arial, sans-serif;
        }

        .box{
            background: rgba(255,255,255,0.92);
            padding:25px;
            border-radius:15px;
            width:420px;
            text-align:center;
            box-shadow:0 0 15px rgba(0,0,0,0.15);
        }

        h1{
            color:#1d4ed8;
            margin-bottom:10px;
        }

        h3{
            color:#333;
            margin-bottom:15px;
        }

        input, select, button{
            width:100%;
            padding:10px;
            margin-top:12px;
            font-size:16px;
            border-radius:8px;
            border:1px solid #ccc;
            box-sizing:border-box;
        }

        button{
            background:#2563eb;
            color:white;
            border:none;
            cursor:pointer;
            font-weight:bold;
        }

        button:hover{
            background:#1d4ed8;
        }
    </style>
</head>

<body>

<div class="box">

    <h1>Select Metro Station & Destination</h1>

    <h3 id="line"></h3>

    <!-- Station Dropdown -->
    <select id="station">
        <option value="">Select Station</option>
    </select>

    <!-- Destination -->
    <div style="display: flex; align-items: center; margin-top: 12px; gap: 10px;">
        <input type="text" id="destination" placeholder="Enter Destination" style="margin-top: 0; flex: 1;">
        <button id="mic-btn" onclick="startDictation()" style="margin-top: 0; width: 50px; background: #eab308; font-size: 20px; padding: 5px; border-radius: 8px; border: 1px solid #ccc; cursor: pointer;" title="Speak Destination">🎤</button>
    </div>

    <button onclick="nextPage()" style="margin-top: 15px;">Get Details</button>

</div>

<script>
// Voice Dictation setup
function startDictation() {
    if (window.hasOwnProperty('webkitSpeechRecognition') || window.hasOwnProperty('SpeechRecognition')) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = "en-IN";
        
        const micBtn = document.getElementById('mic-btn');
        micBtn.style.background = "#ef4444"; // red while listening

        recognition.start();

        recognition.onresult = function(e) {
            document.getElementById('destination').value = e.results[0][0].transcript;
            recognition.stop();
            micBtn.style.background = "#eab308";
        };

        recognition.onerror = function(e) {
            recognition.stop();
            micBtn.style.background = "#eab308";
        };
    } else {
        alert("Your browser does not support Voice Input.");
    }
}

// Get selected line from welcome.html
let selectedLine = localStorage.getItem("metroLine");

document.getElementById("line").innerText =
"Selected Line: " + selectedLine;

// =====================================
// PURPLE LINE ALL STATIONS
// =====================================

const purpleStations = [
    "Whitefield",
    "Kadugodi Tree Park",
    "Pattandur Agrahara",
    "Sri Sathya Sai Hospital",
    "Nallurhalli",
    "Kundalahalli",
    "Seetharamapalya",
    "Hoodi",
    "Garudacharpalya",
    "KR Puram",
    "Mahadevapura",
    "Benniganahalli",
    "Baiyappanahalli",
    "Swami Vivekananda Road",
    "Indiranagar",
    "Halasuru",
    "Trinity",
    "MG Road",
    "Cubbon Park",
    "Vidhana Soudha",
    "Sir M Visvesvaraya",
    "Majestic",
    "Magadi Road",
    "Hosahalli",
    "Vijayanagar",
    "Attiguppe",
    "Deepanjali Nagar",
    "Mysore Road",
    "Nayandahalli",
    "Rajarajeshwari Nagar",
    "Jnanabharathi",
    "Pattanagere",
    "Kengeri Bus Terminal",
    "Kengeri"
];

// =====================================
// GREEN LINE ALL STATIONS
// =====================================

const greenStations = [
    "Nagasandra",
    "Dasarahalli",
    "Jalahalli",
    "Peenya Industry",
    "Peenya",
    "Goraguntepalya",
    "Yeshwanthpur",
    "Sandal Soap Factory",
    "Mahalakshmi",

    "Mantri Square",

    "Chickpet",
    "KR Market",
    "National College",
    "Lalbagh",
    "South End Circle",
    "Jayanagar",
    "R V Road",
    "Banashankari",
    "Jaya Prakash Nagar",
    "Yelachenahalli",
    "Konanakunte Cross",
    "Doddakallasandra",
    "Vajarahalli",
    "Thalaghattapura",
    "Silk Institute"
];

// Fill dropdown
let stationDropdown = document.getElementById("station");

let stations = [];

if(selectedLine === "Purple Line"){
    stations = purpleStations;
}
else if(selectedLine === "Green Line"){
    stations = greenStations;
}

// Add stations to dropdown
stations.forEach(function(station){

    let option = document.createElement("option");
    option.value = station;
    option.textContent = station;

    stationDropdown.appendChild(option);

});

// Next page
function nextPage(){

    let station = document.getElementById("station").value;
    let destination = document.getElementById("destination").value.trim();

    if(station === "" || destination === ""){
        alert("Please select station and enter destination");
        return;
    }

    localStorage.setItem("station", station);
    localStorage.setItem("destination", destination);

    window.location.href = "result.html";
}

</script>

</body>
</html>
